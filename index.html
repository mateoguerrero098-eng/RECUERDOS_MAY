<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Momentos contigo</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: radial-gradient(circle at top,#111,#000);
color:white;
text-align:center;
overflow-x:hidden;
}

/* TITULO */

header{
padding:60px 20px 20px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.frase{
color:#bbbbbb;
font-size:18px;
}

/* GALERIA */

.galeria{
position:relative;
max-width:1000px;
margin:60px auto;
height:900px;
}

.galeria img{
position:absolute;
width:210px;
border-radius:15px;
box-shadow:0 15px 30px rgba(0,0,0,0.6);
transition:0.4s;
}

.galeria img:hover{
transform:scale(1.1);
z-index:10;
}

/* POSICIONES */

.img1{top:20px; left:80px; transform:rotate(-8deg);}
.img2{top:60px; right:120px; transform:rotate(6deg);}
.img3{top:200px; left:250px; transform:rotate(5deg);}
.img4{top:300px; right:200px; transform:rotate(-6deg);}
.img5{top:400px; left:60px; transform:rotate(7deg);}
.img6{top:500px; right:60px; transform:rotate(-5deg);}
.img7{top:600px; left:220px; transform:rotate(4deg);}
.img8{top:720px; right:260px; transform:rotate(-7deg);}
.img9{top:150px; right:360px; transform:rotate(8deg);}
.img10{top:450px; left:350px; transform:rotate(-4deg);}
.img11{top:650px; right:100px; transform:rotate(5deg);}
.img12{top:750px; left:450px; transform:rotate(-6deg);}

/* FOOTER */

footer{
margin-top:80px;
padding:40px;
color:#aaa;
}

.corazon{
font-size:22px;
animation:latido 1.5s infinite;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<header>

<h1>Nuestros recuerdos</h1>

<p class="frase">
Pequeños momentos que significan mucho para mí.
</p>

</header>


<section class="galeria">

<img src="foto1.jpg" class="img1">
<img src="foto2.jpeg" class="img2">
<img src="foto3.jpeg" class="img3">
<img src="foto4.jpeg" class="img4">
<img src="foto5.jpeg" class="img5">
<img src="foto6.jpeg" class="img6">
<img src="foto7.jpeg" class="img7">
<img src="foto8.jpeg" class="img8">
<img src="foto9.jpeg" class="img9">
<img src="foto10.jpeg" class="img10">
<img src="foto11.jpeg" class="img11">
<img src="foto12.jpeg" class="img12">

</section>


<footer>

<p>
Gracias por cada momento que hemos vivido juntos.
</p>

<div class="corazon">❤️</div>

</footer>

</body>
</html>
