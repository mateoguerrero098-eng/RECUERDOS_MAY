<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestros recuerdos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Quicksand&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
font-family:'Quicksand',sans-serif;
color:white;
overflow-x:hidden;
}

/* FONDO DE ESTRELLAS */

.estrellas{
position:fixed;
width:100%;
height:100%;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
opacity:0.25;
z-index:-1;
animation:moverEstrellas 60s linear infinite;
}

@keyframes moverEstrellas{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* CONTENEDOR */

.container{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

/* TEXTO */

.texto{
max-width:260px;
}

.texto h1{
font-family:'Playfair Display',serif;
font-size:38px;
margin-bottom:20px;
}

.texto p{
color:#bbbbbb;
line-height:1.6;
}

/* GALERIA */

.galeria{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:25px;
max-width:700px;
}

.galeria img{
width:100%;
border-radius:15px;
box-shadow:0 15px 30px rgba(0,0,0,0.7);
transition:0.35s;
}

.galeria img:nth-child(odd){
transform:rotate(-4deg);
}

.galeria img:nth-child(even){
transform:rotate(4deg);
}

.galeria img:hover{
transform:scale(1.08) rotate(0deg);
}

/* MENSAJE */

.mensaje{
max-width:260px;
}

.mensaje h2{
font-family:'Playfair Display',serif;
font-size:28px;
}

.mensaje p{
color:#bbbbbb;
}

/* CORAZON */

.corazon{
font-size:28px;
margin-top:20px;
animation:latido 1.5s infinite;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* CORAZONES FLOTANDO */

.heart{
position:fixed;
bottom:-50px;
font-size:20px;
color:#ff4d6d;
animation:flotar 10s linear infinite;
opacity:0.7;
}

@keyframes flotar{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

/* BOTON MENSAJE */

.boton{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.secreto{
display:none;
margin-top:15px;
color:#ddd;
font-style:italic;
}

</style>

</head>

<body>

<div class="estrellas"></div>

<div class="container">

<div class="texto">

<h1>Nuestros recuerdos</h1>

<p>
Pequeños momentos que pueden parecer simples,
pero para mí significan muchísimo.
</p>

<div style="font-size:28px">🌹</div>

</div>


<section class="galeria">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">
<img src="foto7.jpg">
<img src="foto8.jpg">
<img src="foto9.jpg">
<img src="foto10.jpg">
<img src="foto11.jpg">
<img src="foto12.jpg">
<img src="foto13.jpg">
<img src="foto14.jpg">

</section>


<div class="mensaje">

<h2>Para ti</h2>

<p>
Gracias por cada momento que hemos vivido juntos.
</p>

<div class="corazon">❤️</div>

<button class="boton" onclick="mostrarMensaje()">Haz clic aquí</button>

<p class="secreto" id="mensajeSecreto">
Si estás viendo esto, es porque encontraste uno de mis lugares favoritos:
los recuerdos que tengo contigo.
</p>

</div>

</div>

<script>

function mostrarMensaje(){
document.getElementById("mensajeSecreto").style.display="block";
}

/* CREAR CORAZONES */

function crearCorazon(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},10000);
}

setInterval(crearCorazon,1200);

</script>

</body>
</html>
